name: saptak_access_app
description: "Room Access Request System"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.8.3
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1

  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  remove_alpha_ios: true
